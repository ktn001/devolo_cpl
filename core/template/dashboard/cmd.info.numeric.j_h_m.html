<div class="cmd cmd-widget #history#" data-type="info" data-subtype="numeric" data-template="badge" data-cmd_id="#id#" data-cmd_uid="#uid#" data-version="#version#" data-eqLogic_id="#eqLogic_id#" >
	<div class="title #hide_name#">
		<div class="cmdName">#name_display#</div>
	</div>
	<div class="content">
		<div class="label label-info state">
			<span class="value"></span>
		</div>
	</div>
	<div class="timeCmd label label-default #history#>" data-type="info"></div>
	<div class="cmdStats #hide_history#">
			<span title="{{Minimum}}" class="tooltips">#minHistoryValue#</span>|<span
				title="{{Moyenne}}"
				class="tooltips"
				>#averageHistoryValue#</span
			>|<span title="{{Maximum}}" class="tooltips">#maxHistoryValue#</span>
			<i class="#tendance#"></i>
	</div>
	<template>
		<div>color : rgb(20,20,20) ({{Couleur de fond}})</div>
		<div>fontcolor : rgb(20,20,20) ({{Couleur du texte}})</div>
	</template>
	<script>
		jeedom.cmd.addUpdateFunction("#id#", function (_options) {
			let cmd = null
			if (is_object(cmd = document.querySelector('.cmd[data-cmd_id="#id#"]'))) {
				cmd.querySelector('.content').setAttribute('title', '{{Date de valeur}}: ' + _options.valueDate + '<br>{{Date de collecte}}: ' + _options.collectDate)
			}
			let txt = ''

			if (_options.value < 60) {
				if (_options.value > 1) {
					txt = _options.value + ' #minutes#'
				} else {
					txt = _options.value + ' #minute#'
				}
			} else {
				let jours = Math.trunc(_options.value / (24*60))
				let value = _options.value % (24*60)
				let heures = Math.trunc(value / 60)
				let minutes = value % 60

				if (jours > 0) {
					if ((heures == 0) || (minutes == 0)){
						if (jours > 1) {
							txt = jours + ' #jours#'
						} else {
							txt = jours + ' #jour#'
						}
					} else {
						txt = jours + '#jour#'.substring(0,1) + '. '
					}
				}
				if (minutes == 0) {
					if (heures > 1) {
						txt += heures + ' #heures#'
					} else if (heures == 1) {
						txt += heures + ' #heure#'
					}
				} else {
					if (heures > 0) {
						if (heures < 10) {
							txt += '0'
						}
						txt += heures + ':'
						if (minutes < 10)  {
							txt += '0'
						}
						txt += minutes
					} else {
						if (jours > 0) {
							txt += minutes + ' #minutes#'.substring(0,4) + '.'
						} else {
							if (minutes > 1) {
								txt += minutes + ' #minutes#'
							} else {
								txt += minutes + ' #minute#'
							}
						}
					}
				}
			}

			cmd.querySelector('.value').innerHTML = txt
		})
		jeedom.cmd.refreshValue([
			{
				cmd_id: "#id#",
				value: "#value#",
				valueDate: "#valueDate#",
				collectDate: "#collectDate#",
				alertLevel: "#alertLevel#",
				unit: "#unite#",
			},
		]);

		if (domUtils.issetWidgetOptParam("#color#", "color")) {
			document.querySelector(".cmd[data-cmd_uid=#uid#] .label").style.setProperty(
				"background-color",
				"#color#",
				"important",
			);
		}
		if (domUtils.issetWidgetOptParam("#fontcolor#", "fontcolor")) {
			document.querySelector(".cmd[data-cmd_uid=#uid#] .label").style.setProperty(
				"color",
				"#fontcolor#",
				"important",
			);
		}
	</script>
</div>
