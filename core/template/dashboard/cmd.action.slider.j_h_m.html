<div
	class="cmd cmd-widget"
	data-type="action"
	data-subtype="slider"
	data-template="j_h_m"
	data-cmd_id="#id#"
	data-cmd_uid="#uid#"
	data-version="#version#"
	data-eqLogic_id="#eqLogic_id#"
>
	<link rel="stylesheet" href="plugins/devolo_cpl/core/template/dashboard/cmd.action.slider.j_h_m/modal.css">
	<div class="title #hide_name#">
		<div class="cmdName">#name_display#</div>
	</div>
	<div class="content-xs">
		<a class="btn btn-sm btn-default execute tooltips"></a>
	</div>
	<template></template>
	<script>

		document.querySelector('.cmd[data-cmd_uid=#uid#] .execute').addEventListener('click',function(event) {
			let cmd = event.target.closest('.cmd[data-cmd_uid]')
			jeeDialog.dialog({
				id: "GuestTimeInput",
				title: "#modalTimeWifiGuestTitel#",
				width: "400px",
				height: "320px",
				contentUrl: "index.php?v=d&plugin=devolo_cpl&modal=cmd.action.slider.j_h_m",
				callback: function() {
					jeedomUtils.initSpinners()
					let value = cmd.querySelector('a.btn').dataset.value
					devolo_cplActionJHM_modal.setValue(value)
				},
				buttons: {
					cancel: {
						callback: {
							click: function() {
								document.getElementById('GuestTimeInput')._jeeDialog.close()
								document.getElementById('GuestTimeInput')._jeeDialog.destroy()
							}
						}
					},
					confirm: {
						callback: {
							click: function() {
								let value = devolo_cplActionJHM_modal.getValue()
								document.getElementById('GuestTimeInput')._jeeDialog.close()
								document.getElementById('GuestTimeInput')._jeeDialog.destroy()
								jeedom.cmd.execute({id: cmd.dataset.cmd_id, value: {slider: value}})
							}
						}
					}
				},
			})
		})

		jeedom.cmd.addUpdateFunction('#id#', function(_options) {
			if (is_object(cmd = document.querySelector('.cmd[data-cmd_uid="#uid#"]'))) {
				let txt = ''

				if (_options.value < 60) {
					if (_options.display_value > 1) {
						txt = _options.display_value + ' #minutes#'
					} else {
						txt = _options.display_value + ' #minute#'
					}
				} else {
					let jours = Math.trunc(_options.display_value / (24*60))
					let value = _options.display_value % (24*60)
					let heures = Math.trunc(value / 60)
					let minutes = value % 60

					if (jours > 0) {
						if ((heures == 0) || (minutes == 0)){
							if (jours > 1) {
								txt = jours + ' #jours#'
							} else {
								txt = jours + ' #jour#'
							}
						} else {
							txt = jours + '#jour#'.substring(0,1) + '. '
						}
					}
					if (minutes == 0) {
						if (heures > 1) {
							txt += heures + ' #heures#'
						} else if (heures == 1) {
							txt += heures + ' #heure#'
						}
					} else {
						if (heures > 0) {
							if (heures < 10) {
								txt += '0'
							}
							txt += heures + ':'
							if (minutes < 10)  {
								txt += '0'
							}
							txt += minutes
						} else {
							if (jours > 0) {
								txt += minutes + ' #minutes#'.substring(0,4) + '.'
							} else {
								if (minutes > 1) {
									txt += minutes + ' #minutes#'
								} else {
									txt += minutes + ' #minute#'
								}
							}
						}
					}

				}

				cmd.querySelector('a.execute').innerText = txt
				cmd.querySelector('a.execute').dataset.value = _options.display_value
			}
		})

		jeedom.cmd.refreshValue([{ cmd_id: '#id#', display_value: '#state#'}])
	</script>
</div>
